name: CI

# Ruleaza lint + teste la fiecare push si PR catre main.
# Testele de plati (Stripe/Supabase mock-uite) nu au nevoie de secrete reale.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
