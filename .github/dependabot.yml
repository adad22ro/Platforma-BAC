# Dependabot — PR-uri automate de update pentru dependențe.
# CI (lint + typecheck + test) le validează, deci un update care strică ceva
# apare roșu înainte de merge.
version: 2
updates:
  # Dependențe npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Grupăm update-urile minore/patch într-un singur PR, ca să nu fie zgomot.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # ESLint 10 e incompatibil cu eslint-plugin-react adus de eslint-config-next
      # 16.2.9 (folosește context.getFilename() eliminat în ESLint 10). Blocăm
      # major-ul până când eslint-config-next îl suportă. Vezi DEVLOG (S12).
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Acțiunile din workflow-urile GitHub (ex: actions/checkout, setup-node)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
